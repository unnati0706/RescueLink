<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | RescueLink Assistance & Emergency Support</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              blue: '#1E3A8A',    /* Primary Blue */
              lightBlue: '#3B82F6',
              orange: '#F97316',   /* Accent Orange */
              darkOrange: '#EA580C',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between font-sans selection:bg-brand-orange selection:text-white">

  <div class="h-1.5 w-full bg-gradient-to-r from-brand-blue via-brand-lightBlue to-brand-orange"></div>

  <main class="flex-grow flex items-center justify-center px-4 py-12 sm:px-6 lg:px-8 relative overflow-hidden">
    
    <div class="absolute top-[-20%] left-[-10%] w-96 h-96 bg-brand-lightBlue/10 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-96 h-96 bg-brand-orange/10 rounded-full blur-3xl pointer-events-none"></div>

    <div class="max-w-md w-full space-y-8 bg-white/80 backdrop-blur-md p-8 rounded-2xl shadow-xl border border-slate-100 relative z-10 transition-all duration-300 hover:shadow-2xl">
      
      <div class="text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-brand-blue/10 text-brand-blue mb-4 transition-transform duration-300 hover:scale-105">
          <i class="fa-solid fa-truck-pickup text-2xl text-brand-orange"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Welcome Back</h2>
        <p class="mt-2 text-sm text-slate-600">
          Secure access to your emergency dashboard
        </p>
      </div>

      <form class="mt-8 space-y-6" action="#" method="POST" id="loginForm">
        
        <div>
          <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
          <div class="relative rounded-xl shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <i class="fa-regular fa-envelope"></i>
            </div>
            <input 
              id="email" 
              name="email" 
              type="email" 
              autocomplete="email" 
              required 
              class="block w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl bg-slate-50/50 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-2 focus:ring-brand-blue focus:border-transparent transition-all duration-200 text-sm"
              placeholder="name@example.com"
            >
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
          <div class="relative rounded-xl shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <i class="fa-solid fa-lock"></i>
            </div>
            <input 
              id="password" 
              name="password" 
              type="password" 
              autocomplete="current-password" 
              required 
              class="block w-full pl-10 pr-12 py-3 border border-slate-200 rounded-xl bg-slate-50/50 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-2 focus:ring-brand-blue focus:border-transparent transition-all duration-200 text-sm"
              placeholder="••••••••"
            >
            <button 
              type="button" 
              id="togglePassword" 
              class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 focus:outline-none transition-colors duration-200"
              aria-label="Toggle password visibility"
            >
              <i class="fa-regular fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <div class="flex items-center justify-between text-sm">
          <div class="flex items-center">
            <input 
              id="remember-me" 
              name="remember-me" 
              type="checkbox" 
              class="h-4 w-4 text-brand-orange focus:ring-brand-orange border-slate-300 rounded transition-colors cursor-pointer"
            >
            <label for="remember-me" class="ml-2 block text-slate-600 cursor-pointer select-none">
              Remember me
            </label>
          </div>

          <div>
            <a href="#" class="font-medium text-brand-blue hover:text-brand-lightBlue transition-colors duration-200">
              Forgot password?
            </a>
          </div>
        </div>

        <div>
          <button 
            type="submit" 
            class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-gradient-to-r from-brand-blue to-brand-lightBlue hover:from-brand-blue hover:to-brand-blue focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-blue shadow-lg shadow-brand-blue/20 transition-all duration-300 hover:-translate-y-0.5"
          >
            <span class="absolute left-0 inset-y-0 flex items-center pl-3 text-brand-orange/80 group-hover:text-brand-orange transition-colors duration-200">
              <i class="fa-solid fa-shield-halved"></i>
            </span>
            Sign In
          </button>
        </div>
      </form>

      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
        <div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-slate-400">New to the platform?</span></div>
      </div>

      <div class="text-center">
        <a href="#" class="inline-flex items-center gap-1.5 font-semibold text-brand-orange hover:text-brand-darkOrange transition-colors duration-200 text-sm group">
          Create an account
          <i class="fa-solid fa-arrow-right text-xs transition-transform duration-200 group-hover:translate-x-1"></i>
        </a>
      </div>

    </div>
  </main>

  <footer class="py-4 text-center text-xs text-slate-400 border-t border-slate-100 bg-white/50 backdrop-blur-sm">
    &copy; 2026 RescueLink Assistance & Emergency Support Inc. All rights reserved.
  </footer>

  <script>
    const passwordInput = document.getElementById('password');
    const togglePasswordButton = document.getElementById('togglePassword');
    const eyeIcon = document.getElementById('eyeIcon');

    // Toggle Password Visibility Logic
    togglePasswordButton.addEventListener('click', () => {
      const isPassword = passwordInput.getAttribute('type') === 'password';
      
      // Update Input Type
      passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
      
      // Update Icon
      if (isPassword) {
        eyeIcon.classList.remove('fa-regular', 'fa-eye');
        eyeIcon.classList.add('fa-solid', 'fa-eye-slash');
      } else {
        eyeIcon.classList.remove('fa-solid', 'fa-eye-slash');
        eyeIcon.classList.add('fa-regular', 'fa-eye');
      }
    });

    // Form Mock Submission Event Listener
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Frontend validation passed! Form submission is ready to connect to your React auth slice or custom REST API.');
    });
  </script>
</body>
</html>
